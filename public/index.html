<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLink - Gestión de Actores y Películas</title>
    <!-- [BLOQUE: Estilos Modernos] -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <h1>CineLink</h1>

    <div class="container">
        <!-- [BLOQUE: Formulario Películas] -->
        <section class="card">
            <h2>🎬 Nueva Película</h2>
            <form id="peliculaForm" class="form-group">
                <input name="titulo" placeholder="Título de la película" required />
                <input name="anio" placeholder="Año de lanzamiento" type="number" required />
                <button type="submit">Registrar Película</button>
            </form>
        </section>

        <!-- [BLOQUE: Formulario Actores] -->
        <section class="card">
            <h2>🎭 Nuevo Actor</h2>
            <form id="actorForm" class="form-group">
                <input name="nombre" placeholder="Nombre artístico" required />
                <input name="fecha_nacimiento" placeholder="Fecha nac. (YYYY-MM-DD)" required />
                <button type="submit">Añadir al Elenco</button>
            </form>
        </section>

        <!-- [BLOQUE: Formulario Asignación] -->
        <section class="card">
            <h2>🔗 Vincular Carrera</h2>
            <form id="asignForm" class="form-group">
                <input name="pelicula_id" placeholder="ID de Película" type="number" required />
                <input name="actor_id" placeholder="ID de Actor" type="number" required />
                <button type="submit">Crear Vínculo N:N</button>
            </form>
        </section>

        <!-- [BLOQUE: Reportes en Tiempo Real] -->
        <div class="results">
            <section class="card">
                <h3>📁 Catálogo de Películas</h3>
                <div class="data-panel">
                    <div id="peliculas" class="item-list"></div>
                </div>
            </section>
            <section class="card">
                <h3>👤 Directorio de Actores</h3>
                <div class="data-panel">
                    <div id="actores" class="item-list"></div>
                </div>
            </section>
        </div>
    </div>

    <div id="toast" class="toast">¡Operación exitosa!</div>

    <script src="main.js"></script>
</body>
</html>
